<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link rel="icon" type="image/png" href="images/image.png"/>
  <title>KEEP - Vivid Note</title>
  <meta name="description" content="Cattura le tue idee più brillanti con Vivid Note. App di note-taking veloce, colorata e organizzata.">

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind Config (Stitch Design System) -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-low": "#f6f3f2",
            "inverse-surface": "#313030",
            "on-secondary-fixed": "#001356",
            "on-tertiary-fixed": "#022100",
            "on-surface-variant": "#4a4731",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#ebe7e7",
            "on-background": "#1c1b1b",
            "surface-container": "#f0edec",
            "secondary": "#0040e0",
            "inverse-primary": "#d7ca00",
            "inverse-on-surface": "#f3f0ef",
            "on-error": "#ffffff",
            "on-tertiary-fixed-variant": "#095300",
            "on-primary": "#ffffff",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#dcd9d9",
            "background": "#fcf9f8",
            "tertiary-fixed": "#79ff5b",
            "on-secondary-container": "#efefff",
            "on-secondary-fixed-variant": "#0035be",
            "on-tertiary-container": "#137b00",
            "tertiary-container": "#b4ff9b",
            "surface-variant": "#e5e2e1",
            "error": "#ba1a1a",
            "on-primary-container": "#736c00",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "surface": "#fcf9f8",
            "primary-fixed": "#f5e700",
            "secondary-container": "#2e5bff",
            "tertiary-fixed-dim": "#2ae500",
            "surface-bright": "#fcf9f8",
            "primary": "#676000",
            "primary-fixed-dim": "#d7ca00",
            "on-primary-fixed": "#1f1c00",
            "primary-container": "#fff000",
            "surface-container-highest": "#e5e2e1",
            "outline": "#7b785f",
            "outline-variant": "#ccc7aa",
            "secondary-fixed": "#dde1ff",
            "tertiary": "#106e00",
            "on-surface": "#1c1b1b",
            "secondary-fixed-dim": "#b8c3ff",
            "surface-tint": "#676000",
            "on-primary-fixed-variant": "#4d4800"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            lg: "24px",
            "margin-mobile": "20px",
            md: "16px",
            unit: "4px",
            sm: "8px",
            xs: "4px",
            xl: "32px",
            "gutter-mobile": "12px"
          },
          fontFamily: {
            "label-sm": ["Spline Sans"],
            "body-md": ["Spline Sans"],
            "body-lg": ["Spline Sans"],
            "headline-md": ["Spline Sans"],
            "display-lg": ["Spline Sans"]
          },
          fontSize: {
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }],
            "display-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-background font-body-md text-on-background min-h-screen">
  
  <!-- ==================== -->
  <!-- LOADING SCREEN       -->
  <!-- ==================== -->
  <div id="loading-screen" class="fixed inset-0 bg-background z-[9999] flex flex-col items-center justify-center gap-4">
    <div class="w-14 h-14 bg-primary-container rounded-xl flex items-center justify-center shadow-lg animate-bounce">
      <span class="material-symbols-outlined text-on-primary-container text-3xl">edit_note</span>
    </div>
    <p class="font-headline-md text-headline-md tracking-tighter text-on-surface animate-pulse">Notes</p>
  </div>

  <!-- ==================== -->
  <!-- TOAST NOTIFICATIONS  -->
  <!-- ==================== -->
  <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3"></div>

  <!-- ==================== -->
  <!-- APP CONTAINER        -->
  <!-- ==================== -->
  <div id="app"></div>

  <!-- Background Decorative Elements (always visible on auth pages) -->
  <div id="auth-bg-decor" class="hidden">
    <div class="fixed top-[10%] -left-20 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
    <div class="fixed bottom-[10%] -right-20 w-80 h-80 bg-primary-container/10 rounded-full blur-3xl -z-10"></div>
  </div>

  <!-- App JS Modules -->
  <script src="supabase-client.js"></script>
  <script src="views-auth.js"></script>
  <script src="views-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
