<body class="bg-primary-container min-h-screen text-on-background selection:bg-secondary selection:text-white">
<!-- Top Navigation Bar (Derived from Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-stone-900 border-b-2 border-stone-100 dark:border-stone-800 shadow-[0_4px_20px_rgba(0,119,255,0.1)] flex justify-between items-center px-5 py-4">
<div class="flex items-center gap-4">
<button class="active:translate-y-0.5 active:shadow-none transition-all hover:bg-stone-50 dark:hover:bg-stone-800 p-2 rounded-full">
<span class="material-symbols-outlined text-stone-900 dark:text-stone-50" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-2xl font-black tracking-tighter text-stone-900 dark:text-stone-50 font-['Spline_Sans']">Note</h1>
</div>
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-stone-500 hover:bg-stone-50 p-2 rounded-full transition-colors" data-icon="push_pin">push_pin</button>
<button class="material-symbols-outlined text-stone-500 hover:bg-stone-50 p-2 rounded-full transition-colors" data-icon="add_alert">add_alert</button>
<div class="w-10 h-10 rounded-full bg-stone-200 overflow-hidden border-2 border-white shadow-sm">
<img alt="Profile" data-alt="close up of a professional person smiling with a friendly expression in a modern office environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3HDjnxS81dDO9QeMdOTMkxc5CE9vlxEOIn0kjbJ-QXx_7FFg9c51DFA2f9MPBL1kse5ApEJTXgDyylV_gdWfS8Tp3ba7uWijQS8GCUoOBmqiImLgi0Hl_vpupQbF0aMgD9VgYVgtkaltTuBfSEeJwo4ewEBlq0p7_Qzzs5QabiNwhenrNBOA68tJqlt_R7UDuHJCPZ3aCnNxlFkLQNiRynJS38P5mvroqzTyYIs-eclTZ0dD8t_Me1M7tCLXzopaJ9Fh3TVBJAn0"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-margin-mobile max-w-2xl mx-auto">
<!-- Note Category Chip -->
<div class="mb-sm">
<span class="bg-secondary text-white font-label-sm text-label-sm px-4 py-1 rounded-full uppercase tracking-widest shadow-[0_2px_10px_rgba(0,64,224,0.3)]">
                Brainstorm
            </span>
</div>
<!-- Editable Title Area -->
<div class="mb-lg">
<input class="w-full bg-transparent border-none focus:ring-0 font-display-lg text-display-lg text-on-background placeholder:text-stone-400 p-0" placeholder="Title" type="text" value="Panoramica Design System"/>
<div class="h-1 w-24 bg-secondary mt-xs rounded-full"></div>
</div>
<!-- Meta Info -->
<div class="flex items-center gap-md mb-xl text-stone-500 font-label-sm text-label-sm">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
<span>Modificato 12m fa</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]" data-icon="person">person</span>
<span>Mente Creativa</span>
</div>
</div>
<!-- Text Area / Content -->
<div class="space-y-lg">
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-background placeholder:text-stone-400 min-h-[300px] resize-none p-0 leading-relaxed" placeholder="Start writing your brilliant ideas here...">L'obiettivo per il refresh del Q3 è di puntare sull'estetica "Digital Highlighter". 

Dobbiamo assicurarci che l'utente senta un senso di urgenza e gioia quando cattura le note. L'alto contrasto è la chiave.

Checklist per la prossima settimana:
- Controllare tutti gli spessori delle icone
- Finalizzare i token delle ombre Electric Blue
- Testare l'accessibilità sullo sfondo Primary Yellow</textarea>
<!-- Image Attachment (Bento/Modern Style) -->
<div class="group relative overflow-hidden rounded-xl border-2 border-white shadow-lg transition-transform hover:scale-[1.01] active:scale-[0.99]">
<img class="w-full h-48 object-cover" data-alt="abstract composition of vibrant blue and yellow paint swirls with a glossy tactile texture and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYFA-hw-djigFEz_TEik-2v0LTE0oj_bOGC42iM7ZC7QZfSV3hztNe4djkM_no49I79y03xYJWNspqLUI1ufrRQwS6V7pS_3S24MzLzyQ5Qkzy65avOJa_QHZIXs6NSB6FKH7VoheDnaFoyFfi7aQ0JM8HvTFbLeC3hYwMAfbiD9OywkxZ9Sxv4LfM4GX-yBy8FRSnFdCop5Q1Gf3OJRTz1L2usUBOU1OuH1xBAAMPCkleyt8PRfw9c3kCl3eBYunr5p883emGDyQ"/>
<div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-colors"></div>
<button class="absolute top-3 right-3 bg-white/90 p-2 rounded-full shadow-md text-error material-symbols-outlined" data-icon="close">close</button>
</div>
<!-- Task/Checkbox Items -->
<div class="space-y-sm bg-white/50 p-md rounded-xl border border-white/80">
<div class="flex items-center gap-md group">
<button class="w-6 h-6 rounded border-2 border-secondary flex items-center justify-center bg-white">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
<span class="font-body-md text-body-md text-stone-400 line-through">Definisci la tavolozza dei colori primari</span>
</div>
<div class="flex items-center gap-md group">
<button class="w-6 h-6 rounded border-2 border-stone-300 flex items-center justify-center bg-white hover:border-secondary transition-colors">
</button>
<span class="font-body-md text-body-md text-on-background">Esplora layout a griglia asimmetrici</span>
</div>
<div class="flex items-center gap-md group">
<button class="w-6 h-6 rounded border-2 border-stone-300 flex items-center justify-center bg-white hover:border-secondary transition-colors">
</button>
<span class="font-body-md text-body-md text-on-background">Perfeziona la scala tipografica per mobile</span>
</div>
</div>
<!-- Voice Memo Attachment -->
<div class="flex items-center gap-md bg-tertiary-container/30 border-2 border-tertiary-container p-md rounded-2xl shadow-sm">
<button class="w-12 h-12 rounded-full bg-tertiary text-on-tertiary flex items-center justify-center shadow-md active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<div class="flex-1">
<div class="flex items-center gap-1">
<div class="h-2 w-full bg-stone-200 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-tertiary"></div>
</div>
</div>
<span class="text-[10px] font-bold text-on-tertiary-container uppercase tracking-tighter mt-1 block">Recording_001.m4a • 0:42</span>
</div>
<span class="material-symbols-outlined text-tertiary" data-icon="graphic_eq">graphic_eq</span>
</div>
</div>
</main>
<!-- Contextual Bottom Bar for Editing Tools -->
<nav class="fixed bottom-0 left-0 w-full bg-white dark:bg-stone-900 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t border-stone-100 flex justify-around items-center px-4 py-4 pb-safe z-40">
<button class="flex flex-col items-center gap-1 group text-stone-500 hover:text-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="add_box">add_box</span>
<span class="font-label-sm text-label-sm uppercase">Aggiungi Immagine</span>
</button>
<button class="flex flex-col items-center gap-1 group text-stone-500 hover:text-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="checklist">checklist</span>
<span class="font-label-sm text-label-sm uppercase">Attività</span>
</button>
<button class="flex flex-col items-center gap-1 group text-stone-500 hover:text-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
<span class="font-label-sm text-label-sm uppercase">Voce</span>
</button>
<button class="flex flex-col items-center gap-1 group text-stone-500 hover:text-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
<span class="font-label-sm text-label-sm uppercase">Colore</span>
</button>
</nav>
<!-- Secondary FAB for Primary Action (Save/Done) -->
<button class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-tertiary-fixed-dim text-on-tertiary-fixed shadow-[0_8px_25px_rgba(0,186,0,0.2)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
<span class="material-symbols-outlined font-bold" data-icon="check">check</span>
</button>
</body></html>
